# ============================================================================
# Política aplicada por SKU×Nodo (Sprint 2, 2026-05-02)
# Snapshot derivado de policy_templates × clasificación; ver
# /docs/sprints/sprint-2-populate-policy.md.
# ============================================================================

  - id: z_efectivo
    label: "Z efectivo (Service Stock)"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: dimensionless
    formula_text: |
      IF xyz_confidence='low_confidence_seasonal' THEN 1.88
      ELSE policy_templates.z_value WHERE cell = abc_unidades || xyz
    inputs: [sku_intelligence.abc_unidades, sku_intelligence.xyz, productos.categoria, seasonal_categories]
    materialized_in: [sku_node_policy.z_value]
    computed_in: "calc_sku_node_policy_row (función SQL pura, Sprint 2)"
    consumed_by: ["Sprint 4: agente_reposicion v2 (King Method SS)"]
    fuente_doctrina: "H3 + H2 mitigation (Sprint 2)"
    notas:
      - "Fallback 1.88 evita undershoot en SKUs estacionales mal clasificados (AZ falso-positivo)."
      - "Sprint 7+ reemplaza el flag estacional por v_cv_52sem deseasonalizada."

  - id: target_dias_full_aplicado
    label: "Target días Full aplicado por SKU×Nodo"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: dias
    formula_text: "policy_templates.target_dias_full WHERE cell = abc_unidades || xyz"
    inputs: [policy_templates.target_dias_full, sku_intelligence.abc_unidades, sku_intelligence.xyz]
    materialized_in: [sku_node_policy.target_dias_full]
    fuente_doctrina: "H11 (target diferencial por celda, 2026-05-01)"

  - id: policy_action_per_sku
    label: "Acción de política por SKU×Nodo"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: enum
    enum_values: [reorder_normal, reorder_lt_corto, reorder_periodic, reorder_bulk, reorder_minimo, no_reorder]
    formula_text: "policy_templates.action por cell. CZ siempre no_reorder."
    materialized_in: [sku_node_policy.action]
    consumed_by: ["Sprint 4: agente_reposicion (filtro de SKUs eligibles)"]

  - id: xyz_confidence
    label: "Confianza de la clasificación XYZ"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: enum
    enum_values: [high, low_confidence_seasonal]
    formula_text: |
      v_match_category := productos.categoria IN seasonal_categories(active=true)
      v_match_name     := productos.nombre ~* '\m(plumon|plumón|frazada|frazadas|manta|mantas|s[aá]bana\s+t[eé]rmica)\M'  -- Sprint 2.5
      IF (v_match_category OR v_match_name) AND xyz IN ('Y','Z')
      THEN 'low_confidence_seasonal'
      ELSE 'high'
    materialized_in: [sku_node_policy.xyz_confidence]
    fuente_doctrina: "H2 mitigation (Sprint 2 + 2.5 name fallback). Sprint 7+ deriva de CV52 deseasonalizada."

  - id: seasonal_match_source
    label: "Fuente de match seasonal por SKU×Nodo"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: enum
    enum_values: [category, name_pattern, manual, none]
    formula_text: |
      IF productos.categoria IN seasonal_categories(active=true) THEN 'category'
      ELIF productos.nombre ~* '\m(plumon|plumón|frazada|frazadas|manta|mantas|s[aá]bana\s+t[eé]rmica)\M' THEN 'name_pattern'
      ELSE 'none'
      -- 'manual' reserved para overrides UI futuros (Sprint 4+)
    materialized_in: [sku_node_policy.seasonal_match_source]
    consumed_by: ["Audit cobertura H2: % por category vs name_pattern"]
    fuente_doctrina: "Sprint 2.5 (2026-05-02). Camino C híbrido: cobertura via categoría + fallback regex sobre productos.nombre."
    notas:
      - "Prioridad attribution: category > name_pattern > none."
      - "Permite rastrear qué heurística captura cuántos SKUs sin tocar xyz_confidence."

  - id: policy_status
    label: "Estado de política por SKU×Nodo"
    domain: inventario
    grain: "(sku_origen, node_id)"
    unit: enum
    enum_values: [active, blocked_no_cost, blocked_no_history, blocked_no_template]
    formula_text: |
      IF productos.costo_promedio IS NULL OR 0 THEN 'blocked_no_cost'
      ELIF sku_intelligence.abc_unidades IS NULL OR sku_intelligence.xyz IS NULL THEN 'blocked_no_history'
      ELIF policy_templates lookup fails THEN 'blocked_no_template'
      ELSE 'active'
    materialized_in: [sku_node_policy.policy_status]
    consumed_by: ["Sprint 4: agente_reposicion (skip blocked); panel admin (mostrar bloqueos)"]
    notas:
      - "blocked_no_cost respeta feedback_no_inferir_costos (no rellenar con promedio de familia)."

  - id: margen_neto_30d_imputed
    label: "Flag de imputación de margen_neto_30d"
    domain: inventario
    grain: "(sku_origen)"
    unit: bool
    formula_text: |
      enQuiebreImputable := dias_en_quiebre>=14 AND vel_pre_quiebre>2 AND margen_unitario_pre_quiebre>0
      IF enQuiebreImputable:
        imputado := vel_pre_quiebre × margen_unitario_pre_quiebre × 4.3
        margen_neto_30d := MAX(margen_real, imputado)
        margen_neto_30d_imputed := (imputado > margen_real)
      ELSE:
        margen_neto_30d_imputed := false
    materialized_in:
      - sku_intelligence.margen_neto_30d_imputed
      - sku_intelligence_history.margen_neto_30d_imputed
    computed_in: "intelligence.ts:1683-1693 (Sprint 3)"
    consumed_by:
      - "Sprint 4 Reposición v2 (descontar peso de margen imputado)"
      - "Sprint 6 Pricing v2 (filtrar imputed=false para elasticidad observada)"
    fuente_doctrina: "Sprint 3 (2026-05-03). I9 trazabilidad de imputación."
    notas:
      - "Backfill Sprint 3: 22 SKUs vivos + 37 snapshots históricos marcados via stock_snapshots (>=15 días en quiebre en ventana 30d)."
      - "Diferencia criterio: runtime (dias_en_quiebre>=14, vel_pq>2) vs backfill (>=15 días en stock_snapshots) — aceptable porque son fuentes y momentos distintos."

  - id: vel_objetivo_validation
    label: "Validación pre-write de vel_objetivo"
    domain: inventario
    grain: "(sku_origen)"
    unit: enum
    enum_values: [ok, null_aceptable, negativo_no_permitido, demasiado_alto_vs_vel_real, sku_no_existe]
    formula_text: |
      validate_vel_objetivo_input(p_sku_origen, p_vel_objetivo) RETURNS:
        IF sku_origen no existe        → (false, sku_no_existe)
        IF p_vel_objetivo IS NULL      → (true,  null_aceptable)
        IF p_vel_objetivo < 0          → (false, negativo_no_permitido)
        IF vel_ponderada > 0
           AND p_vel_objetivo > 100×vel_ponderada → (false, demasiado_alto_vs_vel_real)
        ELSE                           → (true,  ok)
      Acompañado por CHECK constraint sku_intelligence_vel_objetivo_sane
      que rechaza UPDATE de valores absurdos a nivel DB.
    materialized_in: "RPC pública + CHECK constraint"
    computed_in: "Migration 20260503150000 (Sprint 3)"
    consumed_by:
      - "Sprint 4+ UI vel_objetivo (llamar RPC antes de UPDATE)"
    fuente_doctrina: "Sprint 3 (2026-05-03). I6 guardrails."
    notas:
      - "Pre-deploy: 509 SKUs con vel_objetivo=0 (sin uso real). Cero outliers."
      - "RPC es STABLE: solo lee. UI puede llamarla en blur del input sin penalty."

