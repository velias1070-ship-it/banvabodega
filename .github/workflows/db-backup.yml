name: Daily DB Backup

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 04:00 Chile (UTC-3)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Install pg_dump (Postgres 17)
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Create dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          FILE="banva-prod-${DATE}.dump"
          echo "FILE=${FILE}" >> "$GITHUB_ENV"
          pg_dump -F c -d "$SUPABASE_DB_URL" -f "$FILE"
          ls -lh "$FILE"

      - name: Upload to Supabase Storage
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          URL="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1/object/db-backups/${FILE}"
          HTTP=$(curl -sS -o /tmp/upload.log -w "%{http_code}" \
            -X POST "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary "@${FILE}")
          echo "HTTP ${HTTP}"
          cat /tmp/upload.log
          echo
          if [ "$HTTP" -ge 300 ]; then
            echo "Upload failed"
            exit 1
          fi

      - name: Prune backups older than 30 days
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          LIST=$(curl -sS -X POST "${BASE}/object/list/db-backups" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"","limit":1000,"sortBy":{"column":"name","order":"asc"}}')
          echo "Listing response:"
          echo "$LIST" | jq .
          CUTOFF=$(date -u -d '30 days ago' +%s)
          echo "$LIST" | jq -r '.[].name' | while read -r name; do
            [ -z "$name" ] && continue
            if [[ "$name" =~ banva-prod-([0-9]{4}-[0-9]{2}-[0-9]{2})\.dump ]]; then
              file_date="${BASH_REMATCH[1]}"
              ts=$(date -u -d "$file_date" +%s)
              if [ "$ts" -lt "$CUTOFF" ]; then
                echo "Deleting old backup: $name (date $file_date)"
                curl -sS -X DELETE "${BASE}/object/db-backups/${name}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
                echo
              fi
            fi
          done

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner,
              repo,
              title: `DB backup failed ${date}`,
              body: `Daily Supabase backup workflow failed.\n\nRun: ${runUrl}\n\nCheck the logs and re-run via workflow_dispatch once fixed.`,
              labels: ['backup']
            });
