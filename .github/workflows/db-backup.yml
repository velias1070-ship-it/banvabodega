name: Daily DB Backup

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'  # 22:00, 04:00, 10:00, 16:00 Chile (UTC-3)
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Tipo a forzar (default: 6h)'
        type: choice
        options:
          - '6h'
          - daily
          - weekly
          - monthly
          - all
        default: '6h'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Install pg_dump (Postgres 17)
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Decide targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TYPE: ${{ inputs.backup_type }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_TYPE" in
              "6h")    TARGETS="6h" ;;
              daily)   TARGETS="daily" ;;
              weekly)  TARGETS="weekly" ;;
              monthly) TARGETS="monthly" ;;
              all)     TARGETS="6h daily weekly monthly" ;;
              *)       echo "Unknown backup_type: '$INPUT_TYPE'"; exit 1 ;;
            esac
          else
            TARGETS="6h"
            if [ "$(date -u +%H)" = "07" ]; then
              TARGETS="$TARGETS daily"
              [ "$(date -u +%u)" = "7" ] && TARGETS="$TARGETS weekly"
              [ "$(date -u +%d)" = "01" ] && TARGETS="$TARGETS monthly"
            fi
          fi
          echo "TARGETS=$TARGETS" >> "$GITHUB_ENV"
          echo "Targets resolved: $TARGETS"

      - name: Create dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        shell: bash
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          HM=$(date -u +%H%M)
          YM=$(date -u +%Y-%m)
          echo "DATE=$DATE" >> "$GITHUB_ENV"
          echo "HM=$HM" >> "$GITHUB_ENV"
          echo "YM=$YM" >> "$GITHUB_ENV"
          /usr/lib/postgresql/17/bin/pg_dump -F c -d "$SUPABASE_DB_URL" -f dump.bin
          ls -lh dump.bin

      - name: Upload to targets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          FAILED=()
          for t in $TARGETS; do
            case "$t" in
              "6h")    dest="6h/banva-prod-${DATE}-${HM}.dump" ;;
              daily)   dest="daily/banva-prod-${DATE}.dump" ;;
              weekly)  dest="weekly/banva-prod-${DATE}.dump" ;;
              monthly) dest="monthly/banva-prod-${YM}.dump" ;;
              *)       echo "Unknown target: $t"; FAILED+=("$t"); continue ;;
            esac
            HTTP=$(curl -sS -o /tmp/up.log -w "%{http_code}" \
              -X POST "${BASE}/object/db-backups/${dest}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary "@dump.bin")
            if [ "$HTTP" -ge 300 ]; then
              echo "FAIL upload $t -> $dest (HTTP $HTTP)"
              cat /tmp/up.log; echo
              FAILED+=("$t")
            else
              echo "OK   upload $t -> $dest"
            fi
          done
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "Failed upload targets: ${FAILED[*]}"
            exit 1
          fi

      - name: Prune all prefixes
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          declare -A RETENTION=(
            [6h]=7
            [daily]=30
            [weekly]=90
            [monthly]=365
          )
          PRUNE_FAILS=0
          for prefix in 6h daily weekly monthly; do
            retention="${RETENTION[$prefix]}"
            CUTOFF=$(date -u -d "${retention} days ago" +%s)
            echo "=== Pruning ${prefix}/ (retention ${retention}d, cutoff $(date -u -d @${CUTOFF} +%F))"
            LIST=$(curl -sS -X POST "${BASE}/object/list/db-backups" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"prefix\":\"${prefix}/\",\"limit\":1000,\"sortBy\":{\"column\":\"name\",\"order\":\"asc\"}}")
            NAMES=$(echo "$LIST" | jq -r 'if type == "array" then .[].name else empty end')
            while read -r name; do
              [ -z "$name" ] && continue
              full="${prefix}/${name}"
              d=""
              case "$prefix" in
                "6h")
                  if [[ "$name" =~ ^banva-prod-([0-9]{4}-[0-9]{2}-[0-9]{2})-[0-9]{4}\.dump$ ]]; then
                    d="${BASH_REMATCH[1]}"
                  fi ;;
                daily|weekly)
                  if [[ "$name" =~ ^banva-prod-([0-9]{4}-[0-9]{2}-[0-9]{2})\.dump$ ]]; then
                    d="${BASH_REMATCH[1]}"
                  fi ;;
                monthly)
                  if [[ "$name" =~ ^banva-prod-([0-9]{4}-[0-9]{2})\.dump$ ]]; then
                    d="${BASH_REMATCH[1]}-01"
                  fi ;;
              esac
              if [ -z "$d" ]; then
                echo "  skip (no date match): $full"
                continue
              fi
              ts=$(date -u -d "$d" +%s)
              if [ "$ts" -lt "$CUTOFF" ]; then
                HTTP=$(curl -sS -o /tmp/del.log -w "%{http_code}" \
                  -X DELETE "${BASE}/object/db-backups/${full}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
                if [ "$HTTP" -ge 300 ]; then
                  echo "  FAIL delete $full (HTTP $HTTP)"
                  cat /tmp/del.log; echo
                  PRUNE_FAILS=$((PRUNE_FAILS + 1))
                else
                  echo "  DELETE $full ($d)"
                fi
              fi
            done <<< "$NAMES"
          done
          if [ "$PRUNE_FAILS" -gt 0 ]; then
            echo "Prune completed with $PRUNE_FAILS failures"
            exit 1
          fi
          echo "Prune OK"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner,
              repo,
              title: `DB backup failed ${date}`,
              body: `Multi-tier Supabase backup workflow failed.\n\nRun: ${runUrl}\n\nCheck the logs to see which step (dump, upload, or prune) failed and which target/prefix was affected.`,
              labels: ['backup']
            });
