# BANVA Bodega — Concept Registry
# Capa Concept del CDMP (Concept-Domain-Model-Physical).
# Define qué representa cada concepto del negocio, sin amarrarlo a la implementación.
# Sprint 0 (2026-05-01) — 11 conceptos iniciales.
# Sprint 0.5 (2026-05-02) — agregados 7 meta-conceptos de métricas (capa derivada).

version: 4
last_updated: 2026-05-02
sprints:
  - sprint_0:   "11 conceptos iniciales (2026-05-01)"
  - sprint_0_5: "+7 meta-conceptos de métricas (2026-05-02)"
  - sprint_1:   "+3 conceptos multi-bodega: nodo_logistico, lane_logistica, politica_sku_nodo (2026-05-02)"
  - sprint_2:   "politica_sku_nodo redefinido como snapshot (poblada 974 rows); +categoria_estacional concepto (mitigación H2) (2026-05-02)"

concepts:

  - id: producto
    label: "Producto / SKU origen"
    description: "Unidad física comprada y almacenada. Identificada por un SKU canónico (UPPER+TRIM)."
    cardinality: "Cientos a baja unidades de millar."
    dominio: inventario
    fisico: "productos.sku (PK)"

  - id: sku_venta
    label: "SKU de venta"
    description: "Cómo se vende el producto en ML (puede ser combo, individual, o pack)."
    cardinality: "≥ productos. Puede ser N:1 con producto vía composicion_venta."
    dominio: ventas
    fisico: "ml_items_map.sku_venta, composicion_venta.sku_venta"

  - id: composicion_venta
    label: "Composición de venta"
    description: "Cuántas unidades de qué SKU físico se descuentan al vender un sku_venta."
    cardinality: "1:N por sku_venta. Default trivial (1 unidad de 1 sku_origen)."
    dominio: ventas
    fisico: "composicion_venta (sku_venta, sku_origen, unidades)"

  - id: nodo_inventario
    label: "Nodo de inventario"
    description: "Lugar físico donde reside stock. En el modelo target son 2: Bodega y Full ML."
    cardinality: "2 (per Manual: 'multi-echelon, 2 nodes only'). Flex NO es nodo, es logistic_type."
    dominio: inventario
    fisico: "stock (bodega) + stock_full_cache (Full ML). Sprint 1 (2026-05-02) agrega tabla canónica `nodes` con seeds bodega_central + full_ml + supplier_generic."
    superseded_by: nodo_logistico
    notas:
      - "Sprint 1 introdujo el concepto generalizado `nodo_logistico` (incluye supplier_ref). nodo_inventario sigue siendo válido para describir el subset que tiene stock propio (warehouse + fulfillment)."

  - id: movimiento_stock
    label: "Movimiento de stock"
    description: "Toda variación de cantidad en stock canónico genera un movimiento auditado."
    cardinality: "Alta — miles por mes."
    dominio: inventario
    fisico: "movimientos_stock vía RPC registrar_movimiento_stock(...)"

  - id: velocidad_venta
    label: "Velocidad de venta"
    description: "Unidades vendidas por día, calculadas en ventanas (7d, 30d, 60d, pre-quiebre)."
    cardinality: "1:1 con sku_origen."
    dominio: inventario
    fisico: "sku_intelligence.vel_7d, vel_30d, vel_60d, vel_pre_quiebre"
    notas:
      - "vel_30d/60d excluyen semanas con ≥3 días de quiebre (censoring)."
      - "vel_pre_quiebre se mantiene durante quiebre + rampup."

  - id: clasificacion_abc_xyz
    label: "Clasificación ABC×XYZ"
    description: "9 celdas: ABC por contribución a ventas (Pareto 70/90), XYZ por variabilidad (CV deseasonalizado, bandas 0.25/0.60)."
    cardinality: "1:1 con sku_origen activo."
    dominio: inventario
    fisico: "sku_intelligence (campo cell o derivable)"
    notas:
      - "H1 cerrado: 70/90 (Vicente)."
      - "H2 cerrado: 0.25/0.60 deseasonalizado."

  - id: politica_reposicion
    label: "Política de reposición"
    description: "Service level, z, target_dias_full, action prescritos por celda ABC×XYZ."
    cardinality: "9 (una por celda)."
    dominio: inventario
    fisico: "policy_templates (Sprint 0)"

  - id: deficit_full
    label: "Déficit Full"
    description: "Unidades que faltan en Full ML para alcanzar target_dias_full × velocidad."
    cardinality: "1:1 con sku_origen activo."
    dominio: inventario
    fisico: "Derivado en intelligence.ts (no persistido aún)."
    notas:
      - "Per P-INV-3: NO incluir stock_en_transito en deficit_full."

  - id: quiebre
    label: "Quiebre / stockout"
    description: "Estado donde el SKU no tiene unidades disponibles para venta."
    cardinality: "Eventual."
    dominio: inventario
    fisico: "sku_intelligence.dias_en_quiebre + flag derivado"

  - id: lane_logistico
    label: "Lane logístico"
    description: "Ruta proveedor → bodega o bodega → Full, con LT y costo. Componente de King Method (LT, σ_LT)."
    cardinality: "Decenas — uno por (proveedor, modo) o (bodega, ML inbound)."
    dominio: logistica
    fisico: "Tabla `lanes` (Sprint 1, 2026-05-02). Seeds: supplier_to_bodega (LT 21d), bodega_to_full (LT 5d). Override por SKU vía sku_node_policy.lead_time_override_days."

# ============================================================================
# Multi-bodega foundation (Sprint 1, 2026-05-02)
# ============================================================================

  - id: nodo_logistico
    label: "Nodo logístico"
    description: "Punto del grafo logístico. Generaliza nodo_inventario para incluir referencias a proveedores (supplier_ref) que no tienen stock propio."
    cardinality: "3 inicial (bodega_central, full_ml, supplier_generic). Crece con Sprint N: full_ml_split, bodega_outlet, etc."
    dominio: logistica
    fisico: "nodes (id text PK, node_type ENUM warehouse|fulfillment|supplier_ref)"
    notas:
      - "Sprint 1 sólo crea la tabla. Sprint 2 (Reposición v2) lo consume."
      - "Coexiste con nodo_inventario: nodo_inventario es subset (warehouse + fulfillment)."

  - id: lane_logistica
    label: "Lane / Arco logístico"
    description: "Arco del grafo entre dos nodos. Captura lead time típico y cost factor (este último reservado Sprint 4+)."
    cardinality: "2 seeds. Crece con cada nuevo lane operativo."
    dominio: logistica
    fisico: "lanes (id text PK, from/to FK nodes, lane_type ENUM inbound|transfer|outbound, lead_time_days int)"
    constraints:
      - "from_node_id <> to_node_id (no loops)"
      - "lead_time_days >= 0"

  - id: politica_sku_nodo
    label: "Política por SKU×Nodo"
    description: "Snapshot completo de política aplicable por (sku_origen, node_id), derivado de policy_templates × clasificación. Una fila por cada SKU activo × nodo. manual_override=true preserva contra cron."
    cardinality: "974 al 2026-05-02 (487 SKUs activos × 2 nodos)."
    dominio: inventario
    fisico: "sku_node_policy (snapshot, Sprint 2). PK compuesta (sku_origen, node_id). Schema: cell, service_level, z_value, target_dias_full, action, velocidad_observada, xyz_confidence, policy_status, manual_override."
    notas:
      - "Sprint 1 lo creó como override-only (vacía); Sprint 2 lo redefinió como snapshot poblado por cron."
      - "Frontera Reposición/Pricing (H5 Camino C): tabla autoritativa de Reposición. Pricing escribe en sku_intelligence.markdown_* hasta Sprint 6."
      - "Refresh weekly via /api/policy/sync-from-templates (lunes 11:30 UTC)."

  - id: categoria_estacional
    label: "Categoría estacional"
    description: "Categoría textil con estacionalidad fuerte (pico invierno, valle verano) cuyo CV crudo agregado infla y empuja la clasificación XYZ a Y/Z falsos."
    cardinality: "Sprint 2: 1 activa (quilt) + 5 aspiracionales."
    dominio: inventario
    fisico: "seasonal_categories (PK category, FK lógica a productos.categoria via LOWER)"
    notas:
      - "Mitigación H2 sin esperar a v_cv_52sem deseasonalizado (Sprint 7+)."
      - "Productos en estas categorías con xyz IN (Y,Z) reciben xyz_confidence=low_confidence_seasonal y z=1.88 (conservador)."

  - id: stock_unificado_por_nodo
    label: "Stock unificado por nodo"
    description: "Vista derivada de stock + stock_full_cache que entrega stock por (sku_origen, node_id). Lee SOLO fuentes canónicas — NO ml_items_map.stock_full_cache (deprecada v58)."
    cardinality: "1:N por sku_origen (1 fila por nodo donde tiene stock)."
    dominio: inventario
    fisico: "v_stock_por_nodo (VIEW)"
    notas:
      - "Composición trivial expandida a sku_origen ponderada por unidades."
      - "SKUs Full sin composición se cuentan como sku_origen=sku_venta (defensivo, no debería suceder post-PR6c)."

  - id: in_transit_por_nodo
    label: "Stock en tránsito por nodo"
    description: "Vista derivada de ordenes_compra_lineas que entrega saldo de OCs abiertas por (sku_origen, to_node_id)."
    cardinality: "1:N por sku_origen (mientras tenga OCs abiertas)."
    dominio: inventario
    fisico: "v_in_transit_por_nodo (VIEW)"
    notas:
      - "Estados canónicos: PENDIENTE, EN_TRANSITO, RECIBIDA_PARCIAL (alineado con intelligence-queries.ts:384)."
      - "earliest_eta de fecha_esperada (nullable). Sprint 2 podrá derivar de fecha_emision + lane.lead_time_days."

# ============================================================================
# Meta-conceptos de MÉTRICAS (Sprint 0.5, 2026-05-02)
# Cada uno agrupa N sub-métricas concretas; las fórmulas viven en /metrics.yaml.
# ============================================================================

  - id: velocidad
    label: "Velocidad de venta"
    description: "Tasa de salida del SKU en unidades por semana, en distintas ventanas y contextos."
    cardinality: "1:N por sku_origen (varias ventanas)."
    dominio: inventario
    sub_metrics: [vel_7d, vel_30d, vel_60d, vel_ponderada, vel_full, vel_flex, vel_total, vel_ajustada_evento, vel_pre_quiebre, vel_flex_pre_quiebre, vel_objetivo, vel_ponderada_tsb]
    materialized_in: [sku_intelligence]
    defined_in: /metrics.yaml
    fisico: "sku_intelligence.vel_* (12 columnas)"

  - id: cobertura
    label: "Cobertura"
    description: "Días de stock disponible al ritmo de venta actual (por canal o consolidado)."
    cardinality: "1:N por sku_origen (3 canales: full, flex, total)."
    dominio: inventario
    sub_metrics: [cob_full, cob_flex, cob_total]
    materialized_in: [sku_intelligence]
    defined_in: /metrics.yaml
    notas:
      - "Centinela 999 admisible cuando velocidad ≤ 0 (excepción inventory-policy regla 1, adendum)."

  - id: clasificacion
    label: "Clasificación de productos"
    description: "Etiquetas que ordenan el portfolio: ABC (importancia), XYZ (variabilidad), cuadrante BCG (matriz), celda combinada."
    cardinality: "1:N por sku_origen (5 ejes simultáneos)."
    dominio: inventario
    sub_metrics: [abc_margen, abc_ingreso, abc_unidades, xyz, cv, cuadrante, celda]
    materialized_in: [sku_intelligence]
    defined_in: /metrics.yaml
    fuente_doctrina: "H1 (70/90), H2 (XYZ 0.25/0.60), policy_templates (9 celdas)"

  - id: rentabilidad
    label: "Rentabilidad"
    description: "Métricas que combinan margen, costo y stock para evaluar eficiencia económica."
    cardinality: "1:N por sku_origen + canal."
    dominio: inventario
    sub_metrics: [margen_full_30d, margen_flex_30d, margen_neto_30d, margen_unitario_pre_quiebre, gmroi, dio, costo_neto, costo_bruto, costo_inventario_total, precio_promedio]
    materialized_in: [sku_intelligence, ventas_ml_cache]
    defined_in: /metrics.yaml

  - id: quiebre_metrics
    label: "Métricas de quiebre"
    description: "Profundidad y costo del agotamiento de stock."
    cardinality: "1:N por sku_origen (separado por canal Full vs Flex)."
    dominio: inventario
    sub_metrics: [dias_en_quiebre, dias_en_quiebre_flex, venta_perdida_uds, venta_perdida_pesos, ingreso_perdido]
    materialized_in: [sku_intelligence]
    defined_in: /metrics.yaml
    fuente_doctrina: "PR5 (ancla temporal), PR264 (rampup post-quiebre)"

  - id: decision_reposicion
    label: "Decisiones de reposición"
    description: "Outputs accionables del motor: cuánto pedir al proveedor, cuánto mandar a Full."
    cardinality: "1:1 por sku_origen."
    dominio: inventario
    sub_metrics: [pedir_proveedor, pedir_proveedor_sin_rampup, pedir_proveedor_bultos, factor_rampup_aplicado, mandar_full, target_dias_full, necesita_pedir, liquidacion_accion]
    materialized_in: [sku_intelligence]
    defined_in: /metrics.yaml

  - id: ads_metrics
    label: "Publicidad"
    description: "Costo de ads, ACOS, ROAS, atribución a ventas."
    cardinality: "1:N por sku_origen + campaña + día."
    dominio: ventas
    sub_metrics: [ads_cost_asignado, acos, roas]
    materialized_in: [ml_ads_daily_cache, ventas_ml_cache]
    defined_in: /metrics.yaml
