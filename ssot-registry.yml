# BANVA Bodega — SSoT Registry
# Generado en Sprint 0 (2026-05-01).
# Cada concepto crítico tiene exactamente UN owner_table autoritativo.
# Tablas que derivan o cachean datos lo declaran explícitamente.

version: 4
last_updated: 2026-05-02
owner: Vicente Elías
sprints:
  - sprint_0:   "5 SSoTs operativos iniciales (2026-05-01)"
  - sprint_0_5: "+6 SSoTs de métricas (2026-05-02)"
  - sprint_1:   "+2 SSoTs multi-bodega: politica_reposicion_por_sku_nodo, stock_unificado_por_nodo (2026-05-02)"
  - sprint_2:   "politica_reposicion_por_sku_nodo poblada (snapshot model, 974 rows) + seasonal_categories (mitigación H2) (2026-05-02)"

ssots:

  - concept: stock_canonico
    description: "Stock real en la bodega de BANVA. Fuente de verdad operativa para reposiciones."
    owner_table: stock
    write_path: "RPC registrar_movimiento_stock(...)"
    forbidden_writes:
      - "UPDATE stock SET cantidad ... (sin trigger de movimiento)"
      - "INSERT INTO stock ... fuera de RPC"
    derivable_from: null
    rationale: "Per feedback_movimientos_stock: todo cambio debe generar movimiento. Sin excepciones."
    consumers:
      - intelligence.ts (cálculo de quiebre)
      - panel reposición
      - reportes finanzas

  - concept: stock_full_ml
    description: "Stock distribuido en bodegas Full de MercadoLibre. Cache de la API."
    owner_table: stock_full_cache
    write_path: "Sync ML (cron / on-demand)"
    derivable_from: "ML API /users/me/items/stock"
    rationale: "Cache reconstruible. No autoritativo. Refrescar si hay sospecha de stale."
    consumers:
      - calcularEstadoFlexFull (P-INV-1)
      - inteligencia_full
      - reportes Full

  - concept: composicion_venta
    description: "Mapeo SKU vendido en ML → SKU(s) físicos descontados en bodega y unidades."
    owner_table: composicion_venta
    write_path: "Manual + autoheal trivial (1:1, unidades=1) por syncStockFull"
    derivable_from: null
    rationale: "Per project_banva_sku_sync_autoheal: autoheal trivial para SKUs nuevos. Combos requieren composición manual."
    consumers:
      - syncStockFull
      - cálculo de stock disponible por sku_venta
      - reportes de unidades por sku_origen

  - concept: velocidades_y_estado_sku
    description: "Velocidades de venta (vel_7d, vel_30d, vel_60d, vel_pre_quiebre) y estado (X/Y/Z, A/B/C, días en quiebre)."
    owner_table: sku_intelligence
    write_path: "intelligence.ts → upsert tras cron / on-demand"
    derivable_from: "ventas_ml_cache (anulada=false), stock, stock_full_cache, calendarios"
    rationale: "Per inventario-formulas.md líneas 60-86: tabla canónica para todas las fórmulas. Caso testigo TXTPBL20200SK."
    notes:
      - "vel_30d/60d censuran semanas con ≥3 días quiebre; vel_7d no (líneas 208-211)."
      - "skus_venta es ARRAY (dimensión de salida agregada por sku_origen)."
    consumers:
      - reposición (deficit_full)
      - panel inteligencia
      - calcularEstadoFlexFull

  - concept: politica_reposicion_por_celda
    description: "Service level, z-value, target_dias_full, action por celda ABC×XYZ. Plantilla canónica sin overrides."
    owner_table: policy_templates
    write_path: "Migration o ALTER directo (cambios de política son revisión humana)"
    derivable_from: null
    rationale: "H3+H11+H2 cerrados 2026-05-01. Overrides puntuales viven en sku_node_policy (Sprint 1, 2026-05-02)."
    notes:
      - "AZ usa reorder_lt_corto: NO subir z, reducir LT (per Lokad/Thieuleux SPM:267)."
      - "CZ tiene service_level y z_value NULL: no se recompra."
      - "AX z=2.05 es worked example SPM:713 (cubrecolchón impermeable 2P)."
    consumers:
      - Sprint 2: cálculo SS King Method por celda + lookup política_aplicada(sku, node)
      - Sprint 3: forecast del ROP

  - concept: politica_reposicion_por_sku_nodo
    description: "Snapshot por SKU×Nodo derivado de policy_templates × clasificación ABC×XYZ. Una fila por cada (sku activo, node)."
    domain: inventario
    owner_table: sku_node_policy
    derived_from:
      - "policy_templates (canónico por celda, 9 celdas)"
      - "sku_intelligence (abc_unidades, xyz, vel_ponderada)"
      - "productos (estado_sku, costo_promedio, categoria)"
      - "seasonal_categories (mitigación H2)"
    write_path: "RPC refresh_sku_node_policy_from_templates (cron weekly /api/policy/sync-from-templates lunes 11:30 UTC, Sprint 2). UI admin reposición Sprint 4: escribe manual_override=true."
    refresh_mechanism: "Vercel cron lunes 11:30 UTC + manual via ?run=1"
    override_mechanism: "manual_override=true preserva la fila contra el cron"
    rationale: |
      Frontera Reposición/Pricing — H5 Camino C (2026-05-02). Sprint 2 cambió
      de override-only (Sprint 1, vacía) a snapshot completo. Razón: agentes
      downstream necesitan un read consistente sin replicar lógica de fallback.
      Pricing/markdown sigue en sku_intelligence hasta Sprint 6.
    notes:
      - "PK compuesto (sku_origen, node_id). FK productos + nodes."
      - "974 rows post-Sprint 2 (487 SKUs activos × 2 nodos)."
      - "policy_status: active | blocked_no_cost | blocked_no_history | blocked_no_template."
      - "xyz_confidence ∈ {high, low_confidence_seasonal}. low_confidence → z=1.88 fallback."
      - "Lookup descrito en /docs/policies/frontera-reposicion-pricing.md §3."
      - "NUNCA leer markdown_*: sigue en sku_intelligence hasta Sprint 6."
    consumers:
      - "Sprint 4: agente_reposicion v2 (intelligence.ts:resolverPedirProveedor + resolverMandarFull)"
      - "Sprint 4: panel admin Reposición — columna 'Política aplicada'"
    last_audited: 2026-05-02

  - concept: categorias_estacionales
    description: "Lista de categorías textil hogar Chile con estacionalidad fuerte. Mitigación H2 (status quo CV crudo)."
    domain: inventario
    owner_table: seasonal_categories
    write_path: "Migration (Sprint 2). Cambios manuales con review."
    rationale: |
      H2 cerrado 2026-05-01: bandas xyz 0.5/1.0 + CV crudo. Pero categorías
      seasonal (quilts en BANVA) clasifican AZ/BZ por CV inflado en agregado
      anual cuando deberían ser AY/BY. Esta tabla flagea esos casos para que
      sku_node_policy use z conservador (1.88) en lugar de z bajo de la celda.
    notes:
      - "Categoría seedeada que matchea hoy: 'quilt' (101 productos). Otras (plumones, frazadas, etc.) son aspiracionales hasta que productos.categoria se refine."
      - "is_active=false marca aspiracionales que no matchean nada todavía."
      - "Sprint 7+ (~2027-04, cuando ≥80% del catálogo tenga 52 semanas): reemplaza esta tabla por v_cv_52sem deseasonalizada + xyz_confidence derivado."
    consumers:
      - "calc_sku_node_policy_row → xyz_confidence + z_value fallback"
    last_audited: 2026-05-02

  - concept: stock_unificado_por_nodo
    description: "Stock por (sku_origen, node_id) leído SOLO de fuentes canónicas (stock + stock_full_cache). Composición trivial expandida a sku_origen."
    domain: inventario
    owner_table: null  # es VIEW, no tabla
    derived_view: v_stock_por_nodo
    write_path: "No-write (es vista derivada). Refresh = lectura directa."
    derivable_from: "stock + stock_full_cache + composicion_venta"
    rationale: "Sprint 1 (2026-05-02). Reemplaza queries ad-hoc del motor que mezclaban fuentes (Regla 5 inventory-policy.md). NO lee ml_items_map.stock_full_cache (DEPRECADA v58)."
    notes:
      - "qty_reserved=0 para Full (ML lo gestiona)."
      - "SKUs Full sin composición se cuentan como sku_origen=sku_venta (defensivo)."
      - "Composición con unidades>1 expande legítimamente (combos)."
    consumers:
      - Sprint 2: Reposición v2
      - Panel admin (Sprint 2+)
    last_audited: 2026-05-02

  - concept: stock_in_transit_por_nodo
    description: "Saldo de OCs abiertas por (sku_origen, to_node_id). Sólo líneas con cantidad_pedida > cantidad_recibida."
    domain: inventario
    owner_table: null  # VIEW
    derived_view: v_in_transit_por_nodo
    write_path: "No-write."
    derivable_from: "ordenes_compra + ordenes_compra_lineas (estados PENDIENTE/EN_TRANSITO/RECIBIDA_PARCIAL)"
    rationale: "Sprint 1. Estados alineados con intelligence-queries.ts:384. earliest_eta de fecha_esperada."
    notes:
      - "Si fecha_esperada NULL, Sprint 2 podrá derivar earliest_eta de fecha_emision + lane.lead_time_days."
    consumers:
      - Sprint 2: cobertura efectiva
      - Panel admin (Sprint 2+)
    last_audited: 2026-05-02

# ============================================================================
# SSoTs de MÉTRICAS (Sprint 0.5, 2026-05-02)
# Las fórmulas concretas viven en /metrics.yaml. Aquí se registra la SSoT real
# (función pura) y la tabla cache que la persiste.
# ============================================================================

  - concept: velocidad_sku
    description: "Velocidades vel_7d / 30d / 60d / ponderada / pre_quiebre / ajustada_evento por SKU."
    domain: inventario
    owner_table: sku_intelligence  # CACHE
    write_path: "intelligence.ts:agregarOrdenes + calcVelPonderada (función pura, llamada en recalc)"
    ssot_function: "intelligence.ts:1040-1124"
    defined_in: /metrics.yaml
    consumers:
      - agente_reposicion
      - agente_inventario
      - agente_rentabilidad
      - panel inteligencia
    notes: "sku_intelligence es CACHE. SSoT real es la función pura. Sprint 3 valida y refactoriza."
    last_audited: 2026-05-02

  - concept: clasificacion_abc_xyz
    description: "ABC (3 ejes: margen/ingreso/unidades), XYZ (CV), cuadrante BCG, celda combinada."
    domain: inventario
    owner_table: sku_intelligence  # CACHE
    write_path: "intelligence.ts:paretoABC + cálculo CV inline"
    ssot_function: "intelligence.ts:1192-1196 (xyz), 1650-1742 (Pareto), 1781-1792 (cuadrante)"
    defined_in: /metrics.yaml
    consumers:
      - policy_templates lookup (Sprint 1)
      - protección quiebre prolongado rama 2
      - panel inteligencia
    notes: |
      H2 cerró ratificando el status quo de xyz (bandas 0.5/1.0, CV crudo, deseasonalización al backlog).
      Código y decisión coinciden — no hay inconsistencia operativa.
      Backlog Sprint 7+ (~2027-04, cuando ≥80% del catálogo tenga 52 semanas):
      v_cv_52sem deseasonalizada + columna xyz_confidence en sku_intelligence.
      Ver docs/metrics-inconsistencies-2026-05-02.md sección "Alineadas (false positives)" — I1.
    last_audited: 2026-05-02

  - concept: decision_reposicion
    description: "pedir_proveedor / mandar_full / pedir_bultos derivados con SS+target_dias+rampup."
    domain: inventario
    owner_table: sku_intelligence  # CACHE
    write_path: "intelligence.ts:1906-2003 (composición de varias funciones)"
    ssot_function: "intelligence.ts:resolverPedirProveedor + resolverMandarFull"
    defined_in: /metrics.yaml
    consumers:
      - panel reposición
      - /api/ml/picking
      - agente_reposicion + agente_inventario
    notes: "Decisión final = ceil(cantidad_objetivo - stock_total) × factor_rampup. Sprint 1 leerá policy_templates."
    last_audited: 2026-05-02

  - concept: rentabilidad_sku
    description: "margen_full/flex_*, gmroi, dio, costo_inventario_total, precio_promedio."
    domain: inventario
    owner_table: sku_intelligence  # CACHE de la fórmula
    write_path: "reposicion.ts:calcMargenIntel (función pura) + intelligence.ts:1248-1252 (gmroi/dio)"
    ssot_function: "reposicion.ts:184-199 (margen) + intelligence.ts (gmroi/dio)"
    defined_in: /metrics.yaml
    consumers:
      - agente_rentabilidad
      - panel rentabilidad
      - canal_mas_rentable derivado
    last_audited: 2026-05-02

  - concept: quiebre_metrics_sku
    description: "dias_en_quiebre, fecha_entrada_quiebre, venta_perdida_uds/pesos, ingreso_perdido."
    domain: inventario
    owner_table: sku_intelligence  # CACHE temporal con preservación
    write_path: "intelligence.ts:resolverDiasEnQuiebre + venta_perdida cálculo"
    ssot_function: "intelligence.ts:1290-1391"
    defined_in: /metrics.yaml
    consumers:
      - alertas (agotado_full, agotado_riesgo_venta_perdida)
      - rampup matrix
      - panel reposición
    notes: |
      Preservación entre recalcs: vel_pre_quiebre + fecha_entrada_quiebre se mantienen mientras stock_full=0.
      Reset cuando stock_full > 0 AND vel_30d > 0.
    last_audited: 2026-05-02

  - concept: ads_attribution
    description: "ads_cost_asignado por venta vía pro-rata (ads.ts:69-104). ACOS/ROAS lectura directa ML."
    domain: ventas
    owner_table: ventas_ml_cache  # ads_cost_asignado columna
    cache_table: ml_ads_daily_cache  # cache de la API ML
    write_path: "ads.ts:asignarCostoAds (función pura)"
    ssot_function: "ads.ts:69-104"
    defined_in: /metrics.yaml
    consumers:
      - margen_neto cálculo
      - ROAS panel
      - ml_campaigns_monthly_summary (vista SQL)
    last_audited: 2026-05-02

# Tablas en observación (candidatas a futuros SSoTs)
under_observation:
  - inteligencia_full:
      reason: "Derivada en runtime; podría persistirse si baja la latencia o crece el volumen."
  - forecast_accuracy:
      reason: "Sprint 3 considerará si forecast es SSoT separado o derivado de sku_intelligence."

